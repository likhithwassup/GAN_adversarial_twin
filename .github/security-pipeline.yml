name: MalGAN CI/CD Pipeline

# This tells GitHub to run this script every time someone pushes code
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # 1. Download the code onto the GitHub server
    - name: Checkout Code
      uses: actions/checkout@v3

    # 2. Test if the Docker environment actually builds
    - name: Test Docker Build (Environment Parity)
      run: |
        docker-compose build
        
    # 3. Quick Python Syntax Check (Linting)
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
    - name: Install flake8 (Code Checker)
      run: pip install flake8
    - name: Check for Python Syntax Errors
      run: flake8 scripts/ --count --select=E9,F63,F7,F82 --show-source --statistics

    # 4. (Future Step) Run the Mock Attack
    - name: Placeholder for Threat Intel Test
      run: echo "Ready to run the automated SHAP bypass test!"